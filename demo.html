<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Construction Site - Three.js</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #1a1a1a; }
        canvas { display: block; }
        #info {
            position: absolute;
            top: 15px;
            left: 15px;
            background: rgba(0, 15, 30, 0.85);
            padding: 15px 20px;
            border: 1px solid rgba(0, 255, 255, 0.3);
            border-left: 4px solid #00ffff;
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.2);
            border-radius: 4px;
            pointer-events: none;
            z-index: 100;
            backdrop-filter: blur(4px);
            font-family: 'Courier New', Courier, monospace;
        }
        #info h1 {
            margin: 0 0 5px 0;
            font-size: 18px;
            color: #fff;
            text-shadow: 0 0 8px rgba(0, 255, 255, 0.8);
            display: flex;
            align-items: center;
            gap: 10px;
            letter-spacing: 1px;
        }
        #info p {
            margin: 0;
            font-size: 11px;
            color: #00ffff;
            letter-spacing: 1px;
        }
        .live-dot {
            width: 8px;
            height: 8px;
            background-color: #ff3333;
            border-radius: 50%;
            display: inline-block;
            box-shadow: 0 0 8px #ff3333;
            animation: pulse-dot 1.5s infinite;
        }
        @keyframes pulse-dot {
            0% { transform: scale(0.9); opacity: 0.6; }
            50% { transform: scale(1.3); opacity: 1; }
            100% { transform: scale(0.9); opacity: 0.6; }
        }

        #ai-panel {
            position: absolute;
            top: 10px;
            right: 10px;
            width: 320px;
            height: 400px;
            background: rgba(0, 15, 30, 0.85);
            border: 1px solid #00ffff;
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.5);
            color: #00ffff;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            border-radius: 5px;
            z-index: 100;
            pointer-events: none;
            backdrop-filter: blur(2px);
        }
        #ai-panel-header {
            background: rgba(0, 255, 255, 0.2);
            padding: 10px;
            font-weight: bold;
            border-bottom: 1px solid #00ffff;
            text-align: center;
            letter-spacing: 2px;
        }
        #log-container {
            padding: 10px;
            overflow-y: hidden;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            gap: 5px;
            justify-content: flex-end;
        }
        .log-entry {
            background: rgba(255, 0, 0, 0.15);
            color: #ff5555;
            border-left: 4px solid #ff0000;
            padding: 6px 8px;
            font-size: 13px;
            animation: slideIn 0.3s ease-out;
            text-shadow: 0 0 5px rgba(255, 0, 0, 0.5);
        }
        @keyframes slideIn {
            from { opacity: 0; transform: translateX(20px); }
            to { opacity: 1; transform: translateX(0); }
        }
        #bottom-dashboard {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            background: rgba(0, 10, 20, 0.9);
            border-top: 2px solid #00ffff;
            box-shadow: 0 -5px 15px rgba(0, 255, 255, 0.2);
            padding: 10px 20px;
            z-index: 100;
            display: flex;
            justify-content: space-around;
            align-items: flex-start;
            color: #00ffff;
            font-family: 'Courier New', Courier, monospace;
            backdrop-filter: blur(5px);
            box-sizing: border-box;
        }
        .dash-section {
            display: flex;
            flex-direction: column;
            background: rgba(0, 255, 255, 0.05);
            padding: 12px;
            border-radius: 5px;
            flex: 1;
            margin: 0 10px;
            border: 1px solid rgba(0, 255, 255, 0.2);
        }
        .dash-section h4 {
            margin: 0 0 10px 0;
            color: #fff;
            font-size: 15px;
            text-shadow: 0 0 5px #00ffff;
            border-bottom: 1px solid rgba(0, 255, 255, 0.5);
            padding-bottom: 5px;
            text-align: center;
        }
        .btn-group {
            display: flex;
            gap: 5px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .btn-group button {
            background: rgba(0, 255, 255, 0.1);
            color: #00ffff;
            border: 1px solid #00ffff;
            padding: 6px 12px;
            cursor: pointer;
            transition: 0.3s;
            font-size: 13px;
            font-weight: bold;
            flex: 1;
            min-width: 80px;
        }
        .btn-group button:hover {
            background: rgba(0, 255, 255, 0.3);
        }
        .btn-group button.active {
            background: #00ffff;
            color: #000;
            box-shadow: 0 0 10px #00ffff;
        }
        .dash-section.sliders label {
            font-size: 13px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 8px;
        }
        .dash-section.sliders input[type=range] {
            flex: 1;
            margin: 0 15px;
            accent-color: #00ffff;
        }
        .ai-overlay-grid {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background-image: linear-gradient(rgba(0, 255, 255, 0.05) 1px, transparent 1px),
            linear-gradient(90deg, rgba(0, 255, 255, 0.05) 1px, transparent 1px);
            background-size: 10px 10px;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div id="info">
        <h1><span class="live-dot"></span> 工地監控系統中心</h1>
        <p>AI CONSTRUCTION SITE MONITORING CENTER</p>
    </div>
    
    <div id="bottom-dashboard">
        <div class="dash-section">
            <h4>🕒 情景控制</h4>
            <div class="btn-group">
                <button id="btn-before">清晨</button>
                <button id="btn-during" class="active">中午</button>
                <button id="btn-after">夜間</button>
            </div>
        </div>
        
        <div class="dash-section">
            <h4>👷 人數配置</h4>
            <div class="btn-group">
                <button id="btn-pop-low">少</button>
                <button id="btn-pop-med" class="active">中</button>
                <button id="btn-pop-high">多</button>
            </div>
        </div>

        <div class="dash-section sliders" style="flex: 2;">
            <h4>⚙️ AI 檢測參數</h4>
            <label><span style="width:100px; display:inline-block; text-align:left;">未戴頭盔頻率:</span>
                <input type="range" id="freq-helmet" min="0" max="100" value="5"> 
                <span id="val-freq-helmet" style="width:40px; text-align:right;">0.05%</span>
            </label>
            <label><span style="width:100px; display:inline-block; text-align:left;">吸煙頻率:</span>
                <input type="range" id="freq-smoke" min="0" max="100" value="5"> 
                <span id="val-freq-smoke" style="width:40px; text-align:right;">0.05%</span>
            </label>
            <label><span style="width:100px; display:inline-block; text-align:left;">違規持續時間:</span>
                <input type="range" id="dur-violation" min="60" max="1200" value="300" step="60"> 
                <span id="val-dur-violation" style="width:40px; text-align:right;">5</span> <span style="width:15px; text-align:right;">秒</span>
            </label>
        </div>
    </div>

    <div id="ai-panel">
        <div class="ai-overlay-grid"></div>
        <div id="ai-panel-header">AI 智能監控系統 - LIVE </div>
        <div id="log-container"></div>
    </div>
    
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
    <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // --- 全域狀態參數 ---
        const aiParams = {
            freqHelmet: 0.0005,
            freqSmoke: 0.0005,
            baseDuration: 300
        };

        const popConfig = {
            low: { before: 0, during: 10, after: 3 },
            med: { before: 0, during: 15, after: 4 },
            high: { before: 0, during: 20, after: 5 }
        };
        let currentPopLevel = 'med';
        let currentScenario = 'during';

        const logContainer = document.getElementById('log-container');
        function addAILog(message) {
            const el = document.createElement('div');
            el.className = 'log-entry';
            const timeStr = new Date().toLocaleTimeString('en-GB', { hour12: false });
            el.innerText = `[${timeStr}] ${message}`;
            logContainer.appendChild(el);
            if(logContainer.childElementCount > 10) logContainer.removeChild(logContainer.firstChild);
        }

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB); 
        scene.fog = new THREE.Fog(0x87CEEB, 20, 120);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(30, 20, 30); // Closer default view

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        document.body.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        
        // --- 視角限制設定 (Camera Limits) ---
        controls.maxPolarAngle = Math.PI / 2 - 0.02; // 防止鑽到地下
        controls.minPolarAngle = 0.1; // 防止完全垂直俯視造成視角反轉
        controls.minDistance = 3;  // 最近距離
        controls.maxDistance = 60; // 最遠縮放距離，防止拉太遠
        
        controls.zoomSpeed = 1.5; 

        // 鎖定相機追蹤目標範圍的變數
        const minTarget = new THREE.Vector3(-38, 0, -38);
        const maxTarget = new THREE.Vector3(38, 15, 38);

        // 照明
        const ambientLight = new THREE.AmbientLight(0x666666, 1.0); 
        scene.add(ambientLight);
        const dirLight = new THREE.DirectionalLight(0xffffee, 3);
        dirLight.position.set(40, 60, 20);
        dirLight.castShadow = true;
        dirLight.shadow.mapSize.width = 2048;
        dirLight.shadow.mapSize.height = 2048;
        const d = 50; 
        dirLight.shadow.camera.left = -d; dirLight.shadow.camera.right = d;
        dirLight.shadow.camera.top = d; dirLight.shadow.camera.bottom = -d;
        scene.add(dirLight);

        // 地板與網格
        const planeGeometry = new THREE.PlaneGeometry(80, 80);
        const planeMaterial = new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.9, metalness: 0.2 });
        const floor = new THREE.Mesh(planeGeometry, planeMaterial);
        floor.rotation.x = -Math.PI / 2;
        floor.receiveShadow = true;
        scene.add(floor);
        const gridHelper = new THREE.GridHelper(80, 20, 0x555555, 0x222222);
        gridHelper.position.y = 0.01;
        scene.add(gridHelper);

        const mats = {
            concrete: new THREE.MeshStandardMaterial({ color: 0x888888, roughness: 0.9 }),
            bamboo: new THREE.MeshStandardMaterial({ color: 0xc2a878, roughness: 0.8 }), 
            safetyYellow: new THREE.MeshStandardMaterial({ color: 0xffcc00, roughness: 0.4 }),
            safetyRed: new THREE.MeshStandardMaterial({ color: 0xff3300, roughness: 0.4 }),
            greenNet: new THREE.MeshStandardMaterial({ color: 0x008833, roughness: 0.9, transparent: true, opacity: 0.85 }), 
            wood: new THREE.MeshStandardMaterial({ color: 0x8B4513, roughness: 0.9 }),
            whiteMetal: new THREE.MeshStandardMaterial({ color: 0xeeeeee, roughness: 0.7, metalness: 0.1 }),
            redBarrier: new THREE.MeshStandardMaterial({ color: 0xdd3333, roughness: 0.6 })
        };

        const obstacles = [];

        function createCrane(x, z, height, rotation) {
            const crane = new THREE.Group();
            crane.position.set(x, 0, z);

            const mastGeo = new THREE.BoxGeometry(1.5, height, 1.5);
            const mast = new THREE.Mesh(mastGeo, mats.safetyYellow);
            mast.position.y = height / 2;
            mast.castShadow = true;
            mast.receiveShadow = true;
            crane.add(mast);

            mast.updateWorldMatrix(true, false);
            const mastBox = new THREE.Box3().setFromObject(mast);
            mastBox.expandByScalar(1.2); 
            obstacles.push(mastBox);

            const top = new THREE.Group();
            top.position.y = height;
            top.rotation.y = rotation;
            const cab = new THREE.Mesh(new THREE.BoxGeometry(1.5, 2, 1.5), mats.safetyYellow);
            cab.position.set(1.0, 1, 0); top.add(cab);
            const jib = new THREE.Mesh(new THREE.BoxGeometry(25, 1.5, 1.5), mats.safetyYellow);
            jib.position.set(12.5 - 1.5, 1.5, 0); jib.castShadow = true; top.add(jib);
            const counterJib = new THREE.Mesh(new THREE.BoxGeometry(10, 1.5, 1.5), mats.safetyYellow);
            counterJib.position.set(-5 + 1.5, 1.5, 0); top.add(counterJib);
            const weight = new THREE.Mesh(new THREE.BoxGeometry(3, 3, 2), mats.concrete);
            weight.position.set(-9 + 1.5, 1.5, 0); top.add(weight);
            crane.add(top);
            scene.add(crane);
        }

        // ====== RESTORED: Green Net & Bamboo Building ======
        function createFrameBuilding(x, z, width, height, progress) {
            const building = new THREE.Group();
            building.position.set(x, 0, z);
            const builtH = height * progress;
            const floorHeight = 3.5;
            const hw = width / 2;
            
            // Core structure: Open frame (Columns and Slabs)
            const numFloors = Math.max(1, Math.floor(builtH / floorHeight));
            
            // Build Slabs (Floors)
            const slabGeo = new THREE.BoxGeometry(width - 0.5, 0.3, width - 0.5);
            for(let f = 1; f <= numFloors; f++) {
                const slab = new THREE.Mesh(slabGeo, mats.concrete);
                slab.position.y = f * floorHeight;
                slab.castShadow = true; slab.receiveShadow = true;
                building.add(slab);
            }
            // Base slab
            const baseSlab = new THREE.Mesh(slabGeo, mats.concrete);
            baseSlab.position.y = 0.15;
            building.add(baseSlab);
            
            // Build Columns
            const colWidth = 0.6;
            const colGeo = new THREE.BoxGeometry(colWidth, builtH, colWidth);
            const numCols = 3; 
            for(let i=0; i<numCols; i++) {
                for(let j=0; j<numCols; j++) {
                    const cx = -hw + 1 + i * ((width - 2) / (numCols - 1));
                    const cz = -hw + 1 + j * ((width - 2) / (numCols - 1));
                    const column = new THREE.Mesh(colGeo, mats.concrete);
                    column.position.set(cx, builtH / 2, cz);
                    column.castShadow = true; column.receiveShadow = true;
                    building.add(column);
                }
            }

            // Green Fire-Retardant Net (阻燃網) covering the scaffolding outer layer
            // Using DoubleSide planes on the 4 faces
            mats.greenNet.side = THREE.DoubleSide; // Ensure double-sided rendering
            const netGeoX = new THREE.PlaneGeometry(width, builtH);
            
            // Net faces (slightly outside the building footprint)
            const outOffset = hw + 0.1;
            
            const netFront = new THREE.Mesh(netGeoX, mats.greenNet);
            netFront.position.set(0, builtH / 2, outOffset);
            building.add(netFront);
            
            const netBack = new THREE.Mesh(netGeoX, mats.greenNet);
            netBack.position.set(0, builtH / 2, -outOffset);
            netBack.rotation.y = Math.PI;
            building.add(netBack);
            
            const netLeft = new THREE.Mesh(netGeoX, mats.greenNet);
            netLeft.position.set(-outOffset, builtH / 2, 0);
            netLeft.rotation.y = -Math.PI / 2;
            building.add(netLeft);
            
            const netRight = new THREE.Mesh(netGeoX, mats.greenNet);
            netRight.position.set(outOffset, builtH / 2, 0);
            netRight.rotation.y = Math.PI / 2;
            building.add(netRight);

            // 竹棚架 (Bamboo Scaffolding)
            const bambooDiameter = 0.15;
            
            // Vertical poles all around the building height
            const polesPerSide = Math.floor(width / 1.5);
            const totalBambooH = builtH + 3; // extends 3m above building
            
            // Add vertical poles around building
            const vBambooGeo = new THREE.CylinderGeometry(bambooDiameter, bambooDiameter, totalBambooH);
            for(let i=0; i<=polesPerSide; i++) {
                const offset = -hw + (i * (width / polesPerSide));
                
                const b1 = new THREE.Mesh(vBambooGeo, mats.bamboo); b1.position.set(offset, totalBambooH/2, outOffset + 0.2); building.add(b1);
                const b2 = new THREE.Mesh(vBambooGeo, mats.bamboo); b2.position.set(offset, totalBambooH/2, -outOffset - 0.2); building.add(b2);
                
                if(i > 0 && i < polesPerSide) {
                    const b3 = new THREE.Mesh(vBambooGeo, mats.bamboo); b3.position.set(outOffset + 0.2, totalBambooH/2, offset); building.add(b3);
                    const b4 = new THREE.Mesh(vBambooGeo, mats.bamboo); b4.position.set(-outOffset - 0.2, totalBambooH/2, offset); building.add(b4);
                }
            }

            // Horizontal bamboo poles tying them together
            const hBambooGeoX = new THREE.CylinderGeometry(bambooDiameter, bambooDiameter, width + 0.8);
            const numLevels = Math.floor(totalBambooH / 1.5);
            for(let l=1; l<=numLevels; l++) {
                const yPos = l * 1.5;
                
                const hb1 = new THREE.Mesh(hBambooGeoX, mats.bamboo); hb1.rotation.z = Math.PI/2; hb1.position.set(0, yPos, outOffset + 0.2); building.add(hb1);
                const hb2 = new THREE.Mesh(hBambooGeoX, mats.bamboo); hb2.rotation.z = Math.PI/2; hb2.position.set(0, yPos, -outOffset - 0.2); building.add(hb2);
                
                const hb3 = new THREE.Mesh(hBambooGeoX, mats.bamboo); hb3.rotation.z = Math.PI/2; hb3.rotation.y = Math.PI/2; hb3.position.set(outOffset + 0.2, yPos, 0); building.add(hb3);
                const hb4 = new THREE.Mesh(hBambooGeoX, mats.bamboo); hb4.rotation.z = Math.PI/2; hb4.rotation.y = Math.PI/2; hb4.position.set(-outOffset - 0.2, yPos, 0); building.add(hb4);
            }

            // 加入障礙物計算
            const obstacleBox = new THREE.Box3();
            obstacleBox.setFromCenterAndSize(
                new THREE.Vector3(x, builtH/2, z), 
                new THREE.Vector3(width + 3, builtH, width + 3) // +3 for worker radius
            );
            obstacles.push(obstacleBox);

            scene.add(building);
        }

        function buildWallSegment(w, t, x, y, z, rotY) {
            const group = new THREE.Group();
            group.position.set(x, y, z);
            group.rotation.y = rotY;

            const baseH = 1;
            const base = new THREE.Mesh(new THREE.BoxGeometry(w, baseH, t * 1.5), mats.concrete);
            base.position.y = baseH / 2;
            base.castShadow = true; base.receiveShadow = true;
            group.add(base);

            const panelH = 3.5;
            const panel = new THREE.Mesh(new THREE.BoxGeometry(w, panelH, t), mats.whiteMetal);
            panel.position.y = baseH + panelH / 2;
            panel.castShadow = true; panel.receiveShadow = true;
            group.add(panel);

            const beamCount = Math.floor(w / 4);
            const beamGeo = new THREE.BoxGeometry(0.2, panelH, t * 1.2);
            for(let i=0; i<=beamCount; i++) {
                const beamX = -w/2 + (i * w/beamCount) || 0; 
                const beam = new THREE.Mesh(beamGeo, mats.whiteMetal);
                beam.position.set(beamX, baseH + panelH / 2, 0);
                group.add(beam);
            }
            scene.add(group);
            
            group.updateWorldMatrix(true, false);
            obstacles.push(new THREE.Box3().setFromObject(group));
        }

        function createHoarding(size) {
            const t = 0.5;
            buildWallSegment(size, t, 0, 0, -size/2, 0); 
            buildWallSegment(size, t, size/2, 0, 0, Math.PI/2);
            buildWallSegment(size, t, -size/2, 0, 0, Math.PI/2);
            
            buildWallSegment(32, t, -24, 0, size/2, 0);
            buildWallSegment(32, t, 24, 0, size/2, 0);

            const gateGroup = new THREE.Group();
            gateGroup.position.set(0, 0, size/2);
            
            const pillarGeo = new THREE.BoxGeometry(1.2, 7, 1.2);
            const leftPillar = new THREE.Mesh(pillarGeo, mats.whiteMetal);
            leftPillar.position.set(-8.5, 3.5, 0); leftPillar.castShadow = true; gateGroup.add(leftPillar);
            const rightPillar = new THREE.Mesh(pillarGeo, mats.whiteMetal);
            rightPillar.position.set(8.5, 3.5, 0); rightPillar.castShadow = true; gateGroup.add(rightPillar);

            const boardGeo = new THREE.BoxGeometry(20, 2.5, 1.5);
            const board = new THREE.Mesh(boardGeo, mats.whiteMetal);
            board.position.set(0, 7, 0); board.castShadow = true; gateGroup.add(board);

            for(let i=0; i<3; i++) {
                const barrier = new THREE.Mesh(new THREE.BoxGeometry(1.5, 1, 0.8), i%2==0 ? mats.redBarrier : mats.whiteMetal);
                barrier.position.set(-6 + i*2, 0.5, 2); barrier.castShadow = true; gateGroup.add(barrier);
                
                const barrier2 = new THREE.Mesh(new THREE.BoxGeometry(1.5, 1, 0.8), i%2==0 ? mats.redBarrier : mats.whiteMetal);
                barrier2.position.set(6 - i*2, 0.5, 2); barrier2.castShadow = true; gateGroup.add(barrier2);
            }

            const guardBox = new THREE.Mesh(new THREE.BoxGeometry(2.5, 3, 2.5), mats.whiteMetal);
            guardBox.position.set(-6.5, 1.5, -2); guardBox.castShadow = true; gateGroup.add(guardBox);

            scene.add(gateGroup);
            gateGroup.updateWorldMatrix(true, false);
            obstacles.push(new THREE.Box3().setFromObject(gateGroup));
        }

        // --- 工人生成與防穿牆尋路 ---
        const workers = [];
        let workerIdCounter = 1;

        function createWorker(x, z) {
            const group = new THREE.Group();
            group.position.set(x, 0, z);

            const skinMat = new THREE.MeshStandardMaterial({ color: 0x333333 }); 
            const hatMat = mats.safetyYellow;

            const legGeo = new THREE.CylinderGeometry(0.1, 0.1, 1.5);
            const leftLeg = new THREE.Mesh(legGeo, skinMat); leftLeg.position.set(-0.25, 0.75, 0); group.add(leftLeg);
            const rightLeg = new THREE.Mesh(legGeo, skinMat); rightLeg.position.set(0.25, 0.75, 0); group.add(rightLeg);
            const torso = new THREE.Mesh(new THREE.CylinderGeometry(0.12, 0.12, 1.5), skinMat); torso.position.set(0, 2.25, 0); group.add(torso);
            const armGeo = new THREE.CylinderGeometry(0.08, 0.08, 1.2);
            const leftArm = new Mesh(armGeo, skinMat, -0.4, Math.PI / 8); group.add(leftArm);
            const rightArm = new Mesh(armGeo, skinMat, 0.4, -Math.PI / 8); group.add(rightArm);
            function Mesh(geo, mat, posX, rotZ) { 
                let m=new THREE.Mesh(geo,mat); m.position.set(posX, 2.8, 0); m.rotation.z=rotZ; return m; 
            }
            const head = new THREE.Mesh(new THREE.SphereGeometry(0.35), skinMat); head.position.set(0, 3.2, 0); group.add(head);

            const hatGroup = new THREE.Group();
            const hat = new THREE.Mesh(new THREE.SphereGeometry(0.36, 16, 16, 0, Math.PI*2, 0, Math.PI/2), hatMat); hat.position.set(0, 3.2, 0); hatGroup.add(hat);
            const brim = new THREE.Mesh(new THREE.CylinderGeometry(0.5, 0.5, 0.05), hatMat); brim.position.set(0, 3.2, 0.1); brim.rotation.x = 0.2; hatGroup.add(brim);
            group.add(hatGroup);

            const smoke = new THREE.Mesh(new THREE.SphereGeometry(0.1, 8, 8), new THREE.MeshBasicMaterial({ color: 0xaaaaaa, transparent: true, opacity: 0.8 }));
            smoke.position.set(0, 3.2, 0.3); smoke.visible = false; group.add(smoke);

            const trackerBox = new THREE.LineSegments(new THREE.EdgesGeometry(new THREE.BoxGeometry(1.0, 4.0, 1.0)), new THREE.LineBasicMaterial({ color: 0xff0000, linewidth: 2 }));
            trackerBox.position.y = 2.0; trackerBox.visible = false; group.add(trackerBox);

            group.castShadow = true;
            group.traverse(child => { if(child.isMesh) child.castShadow = true; }); // Make pieces cast shadow
            scene.add(group);

            workers.push({
                id: (workerIdCounter++).toString().padStart(3, '0'),
                mesh: group,
                hatGroup: hatGroup,
                smoke: smoke,
                trackerBox: trackerBox,
                velocity: new THREE.Vector3((Math.random()-0.5)*0.1, 0, (Math.random()-0.5)*0.1),
                changeDirTimer: 0,
                state: { helmetOff: false, smoking: false },
                timers: { helmet: 0, smoke: 0 }
            });
        }

        function isPositionColliding(pos) {
            const checkVec = new THREE.Vector3(pos.x, 1.0, pos.z);
            for(let obs of obstacles) {
                if (obs.containsPoint(checkVec)) return true;
            }
            if(pos.x < -38 || pos.x > 38 || pos.z < -38 || pos.z > 38) return true;
            return false;
        }

        function updateWorkers() {
            workers.forEach(w => {
                const nextPos = w.mesh.position.clone().add(w.velocity);

                let collision = isPositionColliding(nextPos);

                if (collision) {
                    w.velocity.x *= -1;
                    w.velocity.z *= -1;
                    w.changeDirTimer = 999;
                } else {
                    w.mesh.position.copy(nextPos);
                }
                
                if (w.velocity.lengthSq() > 0) {
                    const targetPos = w.mesh.position.clone().add(w.velocity);
                    targetPos.y = w.mesh.position.y;
                    w.mesh.lookAt(targetPos);
                    w.mesh.rotateY(Math.PI); 
                }

                w.changeDirTimer++;
                if (w.changeDirTimer > 100 + Math.random() * 200) {
                    w.velocity.set((Math.random()-0.5)*0.1, 0, (Math.random()-0.5)*0.1);
                    w.changeDirTimer = 0;
                }

                // AI States
                if (!w.state.helmetOff && Math.random() < aiParams.freqHelmet) {
                    w.state.helmetOff = true; 
                    w.timers.helmet = aiParams.baseDuration + Math.random() * (aiParams.baseDuration * 0.5); 
                    w.hatGroup.visible = false;
                    addAILog(`⚠️ 違規偵測：工人 ID-${w.id} 未佩帶頭盔！`);
                }
                if (!w.state.smoking && Math.random() < aiParams.freqSmoke) {
                    w.state.smoking = true; 
                    w.timers.smoke = aiParams.baseDuration + Math.random() * (aiParams.baseDuration * 0.5); 
                    w.smoke.visible = true; w.smoke.position.set(0, 3.2, 0.3); w.smoke.scale.set(1,1,1); w.smoke.material.opacity = 0.8;
                    addAILog(`⚠️ 違規偵測：工人 ID-${w.id} 正在吸煙！`);
                }

                if (w.state.helmetOff) {
                    w.timers.helmet--;
                    if (w.timers.helmet <= 0) { w.state.helmetOff = false; w.hatGroup.visible = true; }
                }
                if (w.state.smoking) {
                    w.timers.smoke--;
                    w.smoke.position.y += 0.015; w.smoke.scale.addScalar(0.015); w.smoke.material.opacity -= 0.01;
                    if (w.smoke.material.opacity <= 0) { w.smoke.position.set(0, 3.2, 0.3); w.smoke.scale.set(1,1,1); w.smoke.material.opacity = 0.8; }
                    if (w.timers.smoke <= 0) { w.state.smoking = false; w.smoke.visible = false; }
                }
                w.trackerBox.visible = (w.state.helmetOff || w.state.smoking);
            });
        }

        // --- 建立場景物件 ---
        createHoarding(80); 
        
        createCrane(10, -10, 25, Math.PI / 4);
        createCrane(-15, 10, 35, -Math.PI / 3);

        createFrameBuilding(0, 0, 10, 25, 0.5);
        createFrameBuilding(-20, -20, 12, 18, 0.3);
        createFrameBuilding(20, 20, 10, 30, 0.7);

        const decoBox = new THREE.Mesh(new THREE.BoxGeometry(6, 4, 6), mats.concrete);
        decoBox.position.set(20, 2, -20);
        decoBox.updateWorldMatrix(true, false);
        obstacles.push(new THREE.Box3().setFromObject(decoBox).expandByScalar(1.5));
        scene.add(decoBox);

        function spawnWorkers() {
            const count = popConfig[currentPopLevel][currentScenario];
            
            // Remove existing workers
            workers.forEach(w => scene.remove(w.mesh));
            workers.length = 0; // Clear array
            
            for(let i=0; i<count; i++) {
                let cx, cz;
                let attempts = 0;
                do {
                    cx = (Math.random()-0.5)*70;
                    cz = (Math.random()-0.5)*70;
                    attempts++;
                } while(isPositionColliding({x: cx, z: cz}) && attempts < 50);
                
                createWorker(cx, cz);
            }
        }

        // Initialize state
        spawnWorkers();

        // DOM Elements
        const btnBefore = document.getElementById('btn-before');
        const btnDuring = document.getElementById('btn-during');
        const btnAfter = document.getElementById('btn-after');
        const btnPopLow = document.getElementById('btn-pop-low');
        const btnPopMed = document.getElementById('btn-pop-med');
        const btnPopHigh = document.getElementById('btn-pop-high');

        // Parameter Sliders
        document.getElementById('freq-helmet').addEventListener('input', (e) => {
            aiParams.freqHelmet = e.target.value / 10000;
            document.getElementById('val-freq-helmet').innerText = (e.target.value / 100).toFixed(2) + '%';
        });
        document.getElementById('freq-smoke').addEventListener('input', (e) => {
            aiParams.freqSmoke = e.target.value / 10000;
            document.getElementById('val-freq-smoke').innerText = (e.target.value / 100).toFixed(2) + '%';
        });
        document.getElementById('dur-violation').addEventListener('input', (e) => {
            aiParams.baseDuration = parseInt(e.target.value);
            document.getElementById('val-dur-violation').innerText = (e.target.value / 60).toFixed(0);
        });

        // Scenario & Population Logic
        function setPopLevel(level) {
            btnPopLow.classList.remove('active');
            btnPopMed.classList.remove('active');
            btnPopHigh.classList.remove('active');
            
            if(level === 'low') btnPopLow.classList.add('active');
            if(level === 'med') btnPopMed.classList.add('active');
            if(level === 'high') btnPopHigh.classList.add('active');
            
            currentPopLevel = level;
            spawnWorkers();
            const levelMap = { low: '低', med: '中', high: '高' };
            addAILog(`👥 系統：人數配置已切換為「${levelMap[level]}」檔`);
        }

        btnPopLow.addEventListener('click', () => setPopLevel('low'));
        btnPopMed.addEventListener('click', () => setPopLevel('med'));
        btnPopHigh.addEventListener('click', () => setPopLevel('high'));

        function setScenario(stage) {
            currentScenario = stage;
            btnBefore.classList.remove('active');
            btnDuring.classList.remove('active');
            btnAfter.classList.remove('active');
            
            if (stage === 'before') {
                btnBefore.classList.add('active');
                scene.background.setHex(0x5A7B9C); // 清晨微亮的灰藍色
                scene.fog.color.setHex(0x5A7B9C);
                ambientLight.color.setHex(0x556677); // 較冷的清晨環境光
                dirLight.color.setHex(0x88aacc); // 偏藍紫的初明光線
                dirLight.intensity = 1.0;
                addAILog("🌅 系統：已切換至「清晨」時段。");
            } else if (stage === 'during') {
                btnDuring.classList.add('active');
                scene.background.setHex(0x87CEEB);
                scene.fog.color.setHex(0x87CEEB);
                ambientLight.color.setHex(0x666666);
                dirLight.color.setHex(0xffffee);
                dirLight.intensity = 3.0;
                addAILog("☀️ 系統：已切換至「中午」時段。");
            } else if (stage === 'after') {
                btnAfter.classList.add('active');
                scene.background.setHex(0x1a2b3c); // 黃昏後的夜色黑藍
                scene.fog.color.setHex(0x1a2b3c); 
                ambientLight.color.setHex(0x333344); 
                dirLight.color.setHex(0xffcc88); // 些微路燈或工地的暖色照明
                dirLight.intensity = 0.8;
                addAILog("🌃 系統：已切換至「夜間」時段。");
            }
            
            spawnWorkers();
        }

        btnBefore.addEventListener('click', () => setScenario('before'));
        btnDuring.addEventListener('click', () => setScenario('during'));
        btnAfter.addEventListener('click', () => setScenario('after'));

        // --- 動畫迴圈 ---
        function animate() {
            requestAnimationFrame(animate);

            controls.target.clamp(minTarget, maxTarget);
            controls.update();

            updateWorkers(); 
            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // --- MQTT 物聯網實時控制整合 ---
        const mqttClient = mqtt.connect('wss://broker.emqx.io:8084/mqtt');
        
        mqttClient.on('connect', () => {
            console.log('✅ MQTT 連線成功');
            mqttClient.subscribe('smarthelmet/status', (err) => {
                if (!err) console.log('✅ 成功訂閱 smarthelmet/status');
            });
            addAILog("🌐 系統：已連接至物聯網中心");
        }); 

        // Google Apps Script URL (請將此處替換為你的 GAS 部署網址)
        // 1. 貼上你專屬的 Google Apps Script 網址
        const gasUrl = "https://script.google.com/macros/s/AKfycbwuFdaRuGCICrHfowwqpeh1hSu4IzNG9bI-3u4qYKQdCes1um_fD8TU-3sBdsr66iV3/exec"; 
        
        mqttClient.on('message', (topic, message) => {
            const msgStr = message.toString();
            console.log(`收到 MQTT 訊息 [${topic}]: ${msgStr}`);

            if (msgStr === "WARNING") {
                let workerIdStr = "ESP32-Worker";
                // 動作一（視覺）：將場景中第一個工人的頭部位顏色改為紅色，並彈出警告 UI
                if (workers.length > 0) {
                    const targetWorker = workers[0];
                    workerIdStr = "ID-" + targetWorker.id; // 抓取 3D 工人的編號
                    
                    const redHatMat = new THREE.MeshStandardMaterial({ color: 0xff0000, roughness: 0.4 });
                    targetWorker.hatGroup.children[0].material = redHatMat;
                    if(targetWorker.hatGroup.children.length > 1) {
                        targetWorker.hatGroup.children[1].material = redHatMat; 
                    }
                    targetWorker.trackerBox.visible = true;
                }
                
                // UI 彈出與面板更新
                alert('警告：工人未佩戴頭盔！');
                
                addAILog('🚨 實時警報：收到頭盔脫落警告！(來自 ESP32)');

                // 2. 動作二（資料庫）：將資料打包成 JSON 格式發送，對應你的 Spreadsheet
                const violationData = {
                    workerId: workerIdStr,
                    violation: "未佩戴頭盔 (ESP32觸發)"
                };

                fetch(gasUrl, {
                    method: 'POST',
                    body: JSON.stringify(violationData), // 將包裹轉成 JSON 字串
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' }, // 避開跨域阻擋
                    mode: 'no-cors' 
                }).then(() => {
                    console.log("✅ 違規紀錄已發送至 Google Apps Script");
                }).catch(err => {
                    console.error("❌ 發送紀錄失敗:", err);
                });
            }
        });
    </script>
</body>
</html>
